<svg
  viewBox="0 0 200 60"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="human-scribble" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.02"
        numOctaves="2"
        result="noise"
      />
      <feDisplacementMap
        in="SourceGraphic"
        in2="noise"
        scale="1.5"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </defs>

  <!-- Underlying Organic Fill Layer -->
  <path
    d="M 14,30 C 12,14 184,8 186,28 C 188,48 16,50 14,30 Z"
    fill="#FDF1DB"
    fill-opacity="0.5"
    filter="url(#human-scribble)"
  />

  <!-- Smooth continuous hand scribble -->
  <path
    d="
      M 18,30
      C 14,14 186,10 188,28
      C 190,46 16,48 14,30
      C 12,12 188,12 186,32
      C 184,52 14,46 18,30
    "
    stroke="#437DB7"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#human-scribble)"
  />
</svg>
